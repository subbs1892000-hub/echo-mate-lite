title: Suspicious PowerShell Encoded Or Hidden Execution
id: 9f4ce8d5-0c1e-4cf5-a8c5-000000000003
status: experimental
description: Detects PowerShell launched with encoded commands, hidden windows, bypass flags, or download patterns.
references:
  - https://sigmahq.io/docs/basics/rules.html
author: Codex
date: 2026-04-22
logsource:
  product: windows
  service: sysmon
  category: process_creation
detection:
  selection_img:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
  selection_cli:
    CommandLine|contains:
      - '-enc'
      - '-encodedcommand'
      - 'invoke-expression'
      - 'iex '
      - 'downloadstring'
      - 'downloadfile'
      - 'frombase64string'
      - ' -nop'
      - ' hidden'
      - ' bypass'
  condition: selection_img and selection_cli
falsepositives:
  - Approved administrative automation
  - Internal deployment scripts
level: high
tags:
  - attack.execution
  - attack.t1059.001
---
title: Linux SSH Brute Force
id: 9f4ce8d5-0c1e-4cf5-a8c5-000000000004
status: experimental
description: Detects repeated SSH authentication failures that may indicate brute force activity.
references:
  - https://sigmahq.io/docs/basics/rules.html
author: Codex
date: 2026-04-22
logsource:
  product: linux
  service: sshd
detection:
  selection:
    message|contains:
      - 'Failed password'
      - 'authentication failure'
  condition: selection
falsepositives:
  - User typo
  - Old automation using stale credentials
level: medium
tags:
  - attack.credential_access
  - attack.t1110
