title: Windows Brute Force Login Attempts
id: 9f4ce8d5-0c1e-4cf5-a8c5-000000000001
status: experimental
description: Detects repeated failed Windows logon attempts that may indicate brute force activity.
references:
  - https://sigmahq.io/docs/basics/rules.html
author: Codex
date: 2026-04-22
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
  condition: selection
falsepositives:
