version: "3.9"

services:
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "5001:5001"
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - server
